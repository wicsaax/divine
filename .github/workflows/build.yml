name: Build divine

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:  # 允许在 Actions 页面手动触发

permissions:
  contents: write  # 创建 Release 时需要

jobs:
  # ------------------------------------------------------------------
  # 1. 测试 + 静态分析 (跑得最快, 出问题第一时间知道)
  # ------------------------------------------------------------------
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  # ------------------------------------------------------------------
  # 2. Android APK (Ubuntu runner)
  # ------------------------------------------------------------------
  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: divine-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  # ------------------------------------------------------------------
  # 3. Windows EXE (Windows runner)
  # ------------------------------------------------------------------
  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop

      # 仓库里没有 windows/ 平台文件 (因为是在 Mac 上创建的),
      # 在 CI 里临时生成. flutter create 会跳过已存在的文件.
      - run: flutter create --platforms=windows .

      - run: flutter build windows --release

      - name: Package Release folder into zip
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          Compress-Archive -Path "$src\*" -DestinationPath "divine-windows.zip" -Force

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: divine-windows-exe
          path: divine-windows.zip
          retention-days: 30

  # ------------------------------------------------------------------
  # 4. 打 tag 时自动建 Release, 把 APK + Windows zip 挂上去
  # ------------------------------------------------------------------
  release:
    needs: [build-android, build-windows]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename APK with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv artifacts/divine-android-apk/app-release.apk artifacts/divine-${VERSION}.apk
          mv artifacts/divine-windows-exe/divine-windows.zip artifacts/divine-${VERSION}-windows.zip

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: divine ${{ github.ref_name }}
          generate_release_notes: true
          files: |
            artifacts/divine-*.apk
            artifacts/divine-*-windows.zip
