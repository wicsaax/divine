name: Build divine

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: divine-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      # 仓库里没有 windows/ 平台文件 (在 Mac 上创建的), 在 CI 里补一下.
      - run: flutter create --platforms=windows .
      - run: flutter build windows --release

      - name: Package Release folder into zip
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          Compress-Archive -Path "$src\*" -DestinationPath "divine-windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: divine-windows-exe
          path: divine-windows.zip
          retention-days: 30

  # ---- Android 单独 Release: 用户推 v0.1.0 → 自动建 v0.1.0-android ----
  release-android:
    needs: build-android
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: divine-android-apk
          path: ./

      - name: Rename with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv app-release.apk divine-${VERSION}.apk

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-android
          name: divine ${{ github.ref_name }} · Android
          body: |
            Android APK build of divine ${{ github.ref_name }}.

            Install: download the APK, transfer to your phone, allow
            installs from unknown sources, tap to install.
          files: divine-*.apk

  # ---- Windows 单独 Release: 用户推 v0.1.0 → 自动建 v0.1.0-windows ----
  release-windows:
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: divine-windows-exe
          path: ./

      - name: Rename with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv divine-windows.zip divine-${VERSION}-windows.zip

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}-windows
          name: divine ${{ github.ref_name }} · Windows
          body: |
            Windows desktop build of divine ${{ github.ref_name }}.

            Install: unzip and run `divine.exe`. First launch SmartScreen
            may warn ("unknown publisher"), click "More info" → "Run anyway".
          files: divine-*-windows.zip
