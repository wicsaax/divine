name: Build divine

on:
  push:
    branches: [main, master]
    tags: ['v*']
  pull_request:
    branches: [main, master]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-android:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      # 如果配了 ANDROID_KEYSTORE_BASE64 等 secret, 解码出 keystore 并用 release 签名.
      # 没配则保持 debug 签名 (build.gradle.kts 里有回退).
      - name: Decode keystore (if release signing configured)
        if: ${{ secrets.ANDROID_KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.ANDROID_KEYSTORE_BASE64 }}" | base64 -d > $RUNNER_TEMP/divine-release.jks
          echo "DIVINE_KEYSTORE_PATH=$RUNNER_TEMP/divine-release.jks" >> $GITHUB_ENV
          echo "DIVINE_KEYSTORE_PASSWORD=${{ secrets.ANDROID_KEYSTORE_PASSWORD }}" >> $GITHUB_ENV
          echo "DIVINE_KEY_ALIAS=${{ secrets.ANDROID_KEY_ALIAS }}" >> $GITHUB_ENV
          echo "DIVINE_KEY_PASSWORD=${{ secrets.ANDROID_KEY_PASSWORD }}" >> $GITHUB_ENV
          echo "✓ Release signing configured"

      - run: flutter pub get
      - run: flutter build apk --release

      - uses: actions/upload-artifact@v4
        with:
          name: divine-android-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30

  build-web:
    needs: test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-web
      - run: flutter create --platforms=web .
      - run: flutter build web --release --base-href "/"

      - name: Package web build
        run: |
          cd build/web
          zip -ry "$GITHUB_WORKSPACE/divine-web.zip" .

      - uses: actions/upload-artifact@v4
        with:
          name: divine-web
          path: divine-web.zip
          retention-days: 30

  build-windows:
    needs: test
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: subosito/flutter-action@v2
        with:
          channel: stable
          flutter-version: '3.41.9'
          cache: true

      - run: flutter pub get
      - run: flutter config --enable-windows-desktop
      # 仓库里没有 windows/ 平台文件 (在 Mac 上创建的), 在 CI 里补一下.
      - run: flutter create --platforms=windows .
      - run: flutter build windows --release

      - name: Package Release folder into zip
        shell: pwsh
        run: |
          $src = "build\windows\x64\runner\Release"
          if (-not (Test-Path $src)) { $src = "build\windows\runner\Release" }
          Compress-Archive -Path "$src\*" -DestinationPath "divine-windows.zip" -Force

      - uses: actions/upload-artifact@v4
        with:
          name: divine-windows-exe
          path: divine-windows.zip
          retention-days: 30

  # 单个 Release, 同时挂 APK + Windows zip 两个文件.
  release:
    needs: [build-android, build-windows, build-web]
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: Rename artifacts with version
        run: |
          VERSION=${GITHUB_REF#refs/tags/}
          mv artifacts/divine-android-apk/app-release.apk artifacts/divine-${VERSION}.apk
          mv artifacts/divine-windows-exe/divine-windows.zip artifacts/divine-${VERSION}-windows.zip
          mv artifacts/divine-web/divine-web.zip artifacts/divine-${VERSION}-web.zip

      - uses: softprops/action-gh-release@v2
        with:
          name: divine ${{ github.ref_name }}
          generate_release_notes: true
          body: |
            ## Downloads

            | 平台 | 文件 | 安装方式 |
            |---|---|---|
            | Android | `divine-${{ github.ref_name }}.apk` | 传到手机, 允许未知来源, 点开安装 |
            | Windows | `divine-${{ github.ref_name }}-windows.zip` | 解压, 双击 `divine.exe` |
            | Web    | `divine-${{ github.ref_name }}-web.zip` | 解压到任意静态 HTTP 服务器根目录 (Nginx/Caddy/Apache 都行) |
          files: |
            artifacts/divine-*.apk
            artifacts/divine-*-windows.zip
            artifacts/divine-*-web.zip
